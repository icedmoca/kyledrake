<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
		/>
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<title>Nyan Cat Run</title>
		<!-- Favicon -->
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<!-- Primary Meta Tags -->
		<meta name="title" content="Nyan Cat Run" />
		<meta
			name="description"
			content="A Nyan Cat jumping game in the style of the Chrome dino runner, with the original Nyan Cat music."
		/>
		<meta name="author" content="kyledrake.me" />
		<!-- Theme Colour -->
		<meta name="theme-color" content="#0b0224" />

		<style>
			:root {
				color-scheme: dark;
			}
			* {
				box-sizing: border-box;
			}
			html,
			body {
				margin: 0;
				height: 100%;
			}
			body {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 18px;
				min-height: 100%;
				background:
					radial-gradient(circle at 20% 20%, #2a0a4f 0%, transparent 55%),
					radial-gradient(circle at 80% 30%, #0a2a5f 0%, transparent 55%),
					#070217;
				font-family: "Courier New", monospace;
				color: #fff;
				overflow: hidden;
				padding: 16px;
			}
			h1 {
				margin: 0;
				font-size: clamp(20px, 4vw, 34px);
				letter-spacing: 2px;
				text-shadow:
					0 0 8px #ff3,
					0 0 18px #f0f,
					3px 3px 0 #000;
			}
			#stage {
				position: relative;
				width: min(900px, 96vw);
				max-width: 900px;
			}
			canvas {
				display: block;
				width: 100%;
				height: auto;
				border-radius: 14px;
				border: 3px solid #ff4fd8;
				box-shadow:
					0 0 0 3px #0b0224,
					0 0 30px rgba(255, 79, 216, 0.5);
				image-rendering: pixelated;
				background: #0b0224;
				touch-action: manipulation;
			}
			#sound {
				position: absolute;
				top: 12px;
				left: 12px;
				width: 40px;
				height: 40px;
				border-radius: 10px;
				border: 2px solid #ff4fd8;
				background: rgba(13, 4, 36, 0.85);
				color: #fff;
				font-size: 18px;
				cursor: pointer;
				display: flex;
				align-items: center;
				justify-content: center;
				z-index: 2;
			}
			#sound:hover {
				background: #2a0a4f;
			}
			.hint {
				font-family: "Courier New", monospace;
				font-size: 14px;
				opacity: 0.8;
				text-align: center;
			}
			.hint kbd {
				background: #1d0a3f;
				border: 1px solid #ff4fd8;
				border-radius: 5px;
				padding: 2px 7px;
				font-size: 12px;
			}
		</style>
	</head>
	<body>
		<h1>🌈 NYAN CAT RUN 🐱</h1>
		<div id="stage">
			<button id="sound" type="button" title="Toggle music" aria-label="Toggle music">🔊</button>
			<canvas id="game" width="900" height="320"></canvas>
		</div>
		<p class="hint">
			Press <kbd>Space</kbd> / <kbd>↑</kbd> or tap to jump &middot; jump the
			obstacles, ride the rainbow
		</p>

		<audio id="bgm" loop preload="auto">
			<source src="/nyan.mp3" type="audio/mpeg" />
			<source src="/nyan.ogg" type="audio/ogg" />
		</audio>

		<script>
			(function () {
				const canvas = document.getElementById("game");
				const ctx = canvas.getContext("2d");
				const bgm = document.getElementById("bgm");
				const soundBtn = document.getElementById("sound");
				const W = canvas.width;
				const H = canvas.height;
				ctx.imageSmoothingEnabled = false;

				// ---------- Official Nyan Cat sprite sheet ----------
				// 6 frames of the original animation, each 34x21 px, laid out
				// horizontally. Drawn with smoothing off for crisp pixels.
				const sprite = new Image();
				let spriteReady = false;
				sprite.onload = () => {
					spriteReady = true;
				};
				sprite.src = "/nyan-sprite.png";
				const FW = 34;
				const FH = 21;
				const NFRAMES = 6;
				const SCALE = 3;
				const SPR_W = FW * SCALE; // 102
				const SPR_H = FH * SCALE; // 63

				// ---------- Game state ----------
				const STATE = { READY: 0, RUNNING: 1, OVER: 2 };
				let state = STATE.READY;
				const baseSpeed = 5.2;
				let speed = baseSpeed;
				let score = 0;
				let best = Number(localStorage.getItem("nyan-best") || 0);
				let frame = 0;

				const GROUND = H - 56; // y where the cat's feet rest
				const cat = {
					x: 70,
					w: SPR_W,
					h: SPR_H,
					y: GROUND - SPR_H,
					vy: 0,
					onGround: true,
				};
				const GRAVITY = 0.62;
				const JUMP_V = -12.6;

				let obstacles = [];
				let spawnIn = 50;

				const stars = [];
				for (let i = 0; i < 70; i++) {
					stars.push({
						x: Math.random() * W,
						y: Math.random() * (GROUND - 30),
						r: Math.random() * 1.8 + 0.4,
						s: Math.random() * 0.6 + 0.2,
					});
				}
				const trail = [];

				function reset() {
					state = STATE.RUNNING;
					speed = baseSpeed;
					score = 0;
					frame = 0;
					obstacles = [];
					spawnIn = 50;
					trail.length = 0;
					cat.y = GROUND - SPR_H;
					cat.vy = 0;
					cat.onGround = true;
					playMusic();
				}

				function jump() {
					if (state === STATE.RUNNING) {
						if (cat.onGround) {
							cat.vy = JUMP_V;
							cat.onGround = false;
						}
					} else {
						reset();
					}
				}

				// ---------- Music ----------
				let muted = false;
				function playMusic() {
					if (muted) return;
					bgm.volume = 0.55;
					const p = bgm.play();
					if (p && p.catch) p.catch(() => {});
				}
				soundBtn.addEventListener("click", (e) => {
					e.stopPropagation();
					muted = !muted;
					soundBtn.textContent = muted ? "🔇" : "🔊";
					if (muted) {
						bgm.pause();
					} else if (state === STATE.RUNNING) {
						playMusic();
					}
				});

				// ---------- Input ----------
				window.addEventListener("keydown", (e) => {
					if (
						e.code === "Space" ||
						e.code === "ArrowUp" ||
						e.key === " " ||
						e.key === "ArrowUp"
					) {
						e.preventDefault();
						jump();
					}
				});
				canvas.addEventListener("mousedown", (e) => {
					e.preventDefault();
					jump();
				});
				canvas.addEventListener(
					"touchstart",
					(e) => {
						e.preventDefault();
						jump();
					},
					{ passive: false },
				);

				// ---------- Spawning ----------
				function spawn() {
					const tall = Math.random() < 0.4;
					const w = 20 + Math.random() * 16;
					const h = tall ? 48 + Math.random() * 26 : 24 + Math.random() * 14;
					obstacles.push({ x: W + 20, w, h });
				}

				function px(x, y, w, h, color) {
					ctx.fillStyle = color;
					ctx.fillRect(x, y, w, h);
				}

				// ---------- Update ----------
				function update() {
					frame++;
					score += speed * 0.02;
					speed = baseSpeed + score * 0.02;

					cat.vy += GRAVITY;
					cat.y += cat.vy;
					if (cat.y >= GROUND - SPR_H) {
						cat.y = GROUND - SPR_H;
						cat.vy = 0;
						cat.onGround = true;
					}

					// rainbow trail emitted from behind the pop-tart
					trail.push({ x: cat.x + 10, y: cat.y + SPR_H * 0.42, frame });
					for (const t of trail) t.x -= speed;
					while (trail.length && trail[0].x < -24) trail.shift();

					spawnIn--;
					if (spawnIn <= 0) {
						spawn();
						const minGap = Math.max(46, 88 - score * 0.15);
						spawnIn = minGap + Math.random() * 50;
					}
					for (const o of obstacles) o.x -= speed;
					obstacles = obstacles.filter((o) => o.x + o.w > -10);

					// collision against the cat's solid core (pop-tart + head)
					const cx = cat.x + 24;
					const cy = cat.y + 9;
					const cw = SPR_W - 36;
					const ch = SPR_H - 27;
					for (const o of obstacles) {
						const oy = GROUND - o.h;
						if (
							cx < o.x + o.w &&
							cx + cw > o.x &&
							cy < oy + o.h &&
							cy + ch > oy
						) {
							gameOver();
						}
					}
				}

				function gameOver() {
					state = STATE.OVER;
					bgm.pause();
					if (score > best) {
						best = Math.floor(score);
						localStorage.setItem("nyan-best", String(best));
					}
				}

				// ---------- Render ----------
				function drawBackground() {
					for (const s of stars) {
						if (state === STATE.RUNNING) {
							s.x -= s.s * (speed * 0.4);
							if (s.x < 0) {
								s.x = W;
								s.y = Math.random() * (GROUND - 30);
							}
						}
						ctx.globalAlpha = 0.6 + Math.sin((frame + s.x) * 0.05) * 0.3;
						px(s.x, s.y, s.r * 2, s.r * 2, "#ffffff");
					}
					ctx.globalAlpha = 1;
					px(0, GROUND, W, H - GROUND, "#13062e");
					ctx.strokeStyle = "#ff4fd8";
					ctx.lineWidth = 2;
					ctx.beginPath();
					ctx.moveTo(0, GROUND);
					ctx.lineTo(W, GROUND);
					ctx.stroke();
				}

				function drawRainbowTrail() {
					const colors = [
						"#ff1d1d",
						"#ff9900",
						"#ffe600",
						"#33d633",
						"#3399ff",
						"#9b59ff",
					];
					const band = 4;
					for (const t of trail) {
						const segW = speed + 2;
						const zig = (Math.floor(t.frame / 6) % 2) * band;
						const top = t.y - (colors.length * band) / 2 + zig - band;
						for (let c = 0; c < colors.length; c++) {
							ctx.fillStyle = colors[c];
							ctx.fillRect(t.x, top + c * band, segW + 1, band);
						}
					}
				}

				function drawObstacles() {
					for (const o of obstacles) {
						const oy = GROUND - o.h;
						px(o.x, oy, o.w, o.h, "#28104f");
						px(o.x, oy, o.w, 4, "#7a3cff");
						px(o.x + o.w / 2 - 2, oy + 6, 4, o.h - 10, "#a06bff");
					}
				}

				function drawCat() {
					const x = Math.round(cat.x);
					const y = Math.round(cat.y);
					if (spriteReady) {
						const fi =
							state === STATE.RUNNING ? Math.floor(frame / 4) % NFRAMES : 0;
						ctx.drawImage(
							sprite,
							fi * FW,
							0,
							FW,
							FH,
							x,
							y,
							SPR_W,
							SPR_H,
						);
					} else {
						// fallback block until the sprite loads
						px(x + 12, y + 12, SPR_W - 24, SPR_H - 24, "#fca6d1");
					}
				}

				function drawHud() {
					ctx.fillStyle = "#fff";
					ctx.font = "16px 'Courier New', monospace";
					ctx.textAlign = "right";
					ctx.fillText(
						"SCORE " + String(Math.floor(score)).padStart(5, "0"),
						W - 16,
						28,
					);
					ctx.fillStyle = "#ffd54f";
					ctx.fillText("BEST " + String(best).padStart(5, "0"), W - 16, 50);
					ctx.textAlign = "left";
				}

				function drawCenterText(lines) {
					ctx.save();
					ctx.fillStyle = "rgba(7,2,23,0.72)";
					ctx.fillRect(0, 0, W, H);
					ctx.textAlign = "center";
					ctx.fillStyle = "#fff";
					ctx.font = "26px 'Courier New', monospace";
					ctx.fillText(lines[0], W / 2, H / 2 - 18);
					ctx.font = "16px 'Courier New', monospace";
					ctx.fillStyle = "#ffd54f";
					for (let i = 1; i < lines.length; i++) {
						ctx.fillText(lines[i], W / 2, H / 2 + 14 + (i - 1) * 26);
					}
					ctx.restore();
					ctx.textAlign = "left";
				}

				function render() {
					ctx.clearRect(0, 0, W, H);
					drawBackground();
					drawRainbowTrail();
					drawObstacles();
					drawCat();
					drawHud();

					if (state === STATE.READY) {
						drawCenterText(["NYAN CAT RUN", "Press Space / Tap to start"]);
					} else if (state === STATE.OVER) {
						drawCenterText([
							"GAME OVER",
							"Score " + Math.floor(score) + "  |  Best " + best,
							"Press Space / Tap to retry",
						]);
					}
				}

				function loop() {
					if (state === STATE.RUNNING) update();
					render();
					requestAnimationFrame(loop);
				}

				loop();
			})();
		</script>
	</body>
</html>
